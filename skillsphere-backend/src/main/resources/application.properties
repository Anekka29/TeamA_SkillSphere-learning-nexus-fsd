spring.application.name=skillsphere-backend

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/skillsphere_db?createDatabaseIfNotExist=true
spring.datasource.username=your_db_username
spring.datasource.password=your_db_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration (30 minutes = 1800000 ms)
jwt.secret=your_jwt_secret_key_must_be_at_least_256_bits_long
jwt.expiration=1800000

# Server
server.port=8080

# Logging - DEBUG everything we need to trace
logging.level.org.springframework.security=DEBUG
logging.level.com.skillsphere=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=your_google_oauth_client_id
spring.security.oauth2.client.registration.google.client-secret=your_google_oauth_client_secret
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_email_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
